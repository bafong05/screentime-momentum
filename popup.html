<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Screen Time Momentum</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="popup-min">
    <h1>Current Session</h1>

    <div class="card">
      <div class="big" id="elapsed">0:00</div>

      <div class="meta">
        <div><strong>Sites visited:</strong> <span id="sitesCount">0</span></div>
        <div class="tiny" id="sitesList">No session yet.</div>
      </div>
    </div>

    <div class="row">
      <button id="openDashboard">Dashboard</button>
      <button id="clearData" class="danger">Clear</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
