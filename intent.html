<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Choose Intended Duration</title>
    <link rel="stylesheet" href="intent.css" />
  </head>
  <body class="intentPage">
    <main class="intentShell">
      <section class="intentCard">
        <div class="intentEyebrow" id="intentEyebrow">New Session</div>
        <h1 id="intentTitle">Choose intended duration for new session</h1>
        <p class="intentHint" id="intentHint">A new session started after inactivity. Select a goal to continue.</p>

        <div class="intentOther">
          <div class="intentOtherRow">
            <input id="sessionNameInput" type="text" maxlength="80" placeholder="Session name (optional)" />
          </div>
        </div>

        <div class="intentOptions">
          <button class="intentOption" type="button" data-minutes="5">Real quick &lt;5 min</button>
          <button class="intentOption" type="button" data-minutes="15">15 min</button>
          <button class="intentOption" type="button" data-minutes="30">30 min</button>
          <button class="intentOption" type="button" data-minutes="45">45 min</button>
          <button class="intentOption" type="button" data-minutes="60">1 hr</button>
          <button class="intentOption" type="button" data-no-goal="true">No goal</button>
        </div>

        <div class="intentOther">
          <div class="intentOtherTitle">Other</div>
          <div class="intentOtherRow">
            <input id="otherIntentInput" type="number" min="1" step="1" placeholder="Minutes" />
            <button id="applyOtherIntent" type="button">Set</button>
          </div>
        </div>
      </section>
    </main>
    <script src="session_helpers.js"></script>
    <script src="intent.js"></script>
  </body>
</html>
